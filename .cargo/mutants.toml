# cargo-mutants configuration.

# The scalar permutation's per-round arithmetic is checked exhaustively by the
# CAVP known-answer vectors and the libcrux differential tests; those catch any
# arithmetic mutation. No functions are excluded here — a surviving mutant is a
# genuine test gap. (The CI legs additionally exclude the *other* arch's
# backend file via --exclude, since a cfg'd-out file's mutants survive
# trivially; see .github/workflows/mutants.yml.)
exclude_re = [
    # build.rs only emits cfg flags; mutating it changes nothing testable.
    "build\\.rs",
    # The sponges' `offset % 8` alignment checks gate the whole-lane fast
    # path; `% -> +` makes the check never/always fail so every byte takes
    # the byte path, which is the semantic definition — output-equivalent,
    # unkillable by correctness tests. (`% -> /` and the loop-bound mutants
    # stay in: those reach the word path misaligned and corrupt output.)
    "replace % with \\+ in Sponge(X4)?<RATE>::(absorb|squeeze)",
]
