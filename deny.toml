# cargo-deny configuration. https://embarkstudios.github.io/cargo-deny/

[advisories]
unmaintained = "warn"
yanked = "deny"

[bans]
multiple-versions = "warn"
wildcards = "deny"

[licenses]
# Permissive licenses acceptable for an Apache-2.0 OR MIT crate.
allow = [
    "MIT",
    "Apache-2.0",
]
confidence-threshold = 0.9

[sources]
unknown-registry = "deny"
unknown-git = "deny"
