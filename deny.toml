# cargo-deny configuration. https://embarkstudios.github.io/cargo-deny/

[graph]
# Zero runtime deps: gate only this crate, not dev-only trees.
exclude-dev = true

[advisories]
yanked = "deny"

[bans]
multiple-versions = "warn"
wildcards = "deny"

[licenses]
# The crate's own dual license; the only ones in the graph.
allow = [
    "MIT",
    "Apache-2.0",
]
confidence-threshold = 0.9

[sources]
unknown-registry = "deny"
unknown-git = "deny"
