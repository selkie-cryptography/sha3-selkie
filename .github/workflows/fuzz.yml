name: Fuzz

# Differential fuzzing against libcrux-sha3. A short smoke on PRs catches
# regressions fast; a longer soak runs weekly. Coverage-guided search reaches
# rate-block edges the fixed vectors and bounded proptests miss — most valuable
# once the vectorized permutation backends land.

on:
  pull_request:
    paths:
      - "src/**"
      - "fuzz/**"
      - "Cargo.toml"
      - ".github/workflows/fuzz.yml"
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fuzz:
    name: fuzz (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [differential, batched]
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      # Accumulate discoveries across runs on top of the committed seed corpus.
      # Immutable key per run; restore-keys pulls the most recent prior cache.
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: fuzz/corpus/${{ matrix.target }}
          key: fuzz-corpus-${{ matrix.target }}-${{ github.run_id }}
          restore-keys: |
            fuzz-corpus-${{ matrix.target }}-
      # Nightly: libFuzzer instrumentation is nightly-only.
      - uses: dtolnay/rust-toolchain@4fd1da8b0805d2d2e936788875a7d65dbd677dc2 # nightly
      - uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2
        with:
          tool: cargo-fuzz@0.13.2
      # 15-minute soak on the weekly cron, 2-minute smoke on PRs and dispatch.
      - name: Fuzz
        run: |
          cargo fuzz run ${{ matrix.target }} -- \
            -max_total_time=${{ github.event_name == 'schedule' && 900 || 120 }} \
            -rss_limit_mb=4096
      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fuzz-artifacts-${{ matrix.target }}
          path: fuzz/artifacts
