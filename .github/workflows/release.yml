name: Release

# Publishes to crates.io via trusted publishing (OIDC) on a v* tag.
#
# Versioning: pre-1.0 SemVer — 0.x minor may break API, patches don't.
#
# One-time setup (before 0.1.0):
#   [ ] repo public; secret scanning + push protection + Dependabot on
#   [ ] Actions default token read-only
#   [ ] ruleset v* tags: restricted creation, immutable, signed
#   [ ] ruleset main: required checks (CI, Audit)
#   [ ] `release` environment with a required reviewer
#   [ ] bootstrap publish (trusted publishing needs an existing crate):
#       fresh clone of the signed tag, short-lived publish-new token,
#       cargo publish --locked, revoke the token
#   [ ] configure crates.io trusted publishing: this repo + release.yml +
#       the `release` environment
#
# Each release: bump the version + CHANGELOG in a reviewed PR, then
# `git tag -s vX.Y.Z` on the merge commit, push, and approve `release`.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

env:
  # The release gates run on this pinned toolchain; bump it deliberately in
  # its own PR.
  RELEASE_TOOLCHAIN: "1.97.1"

jobs:
  # Refuses tags that do not point at a green, reviewed main commit, so a
  # pushed tag alone can never ship unreviewed code.
  preflight:
    name: Tag provenance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Tag commit is on main
        run: git merge-base --is-ancestor "$GITHUB_SHA" origin/main
      - name: Tag matches Cargo.toml version
        run: |
          manifest=$(grep -m1 '^version = ' Cargo.toml | cut -d'"' -f2)
          [ "${GITHUB_REF_NAME#v}" = "$manifest" ]
      - name: CI and Audit concluded green on this commit
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const required = ['CI', 'Audit'];
            const runs = await github.paginate(
              github.rest.actions.listWorkflowRunsForRepo,
              { owner: context.repo.owner, repo: context.repo.repo,
                head_sha: context.sha, per_page: 100 });
            for (const name of required) {
              const run = runs.find((r) => r.name === name);
              if (!run || run.conclusion !== 'success') {
                core.setFailed(`${name}: ${run ? run.conclusion ?? run.status : 'no run'} for ${context.sha}`);
              }
            }

  # Full re-run of the merge gates on the exact tagged tree, `--locked` so the
  # committed Cargo.lock is what gets built.
  gates:
    name: Release gates
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: ${{ env.RELEASE_TOOLCHAIN }}
      - uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2
        with:
          # cargo-deny pinned in lockstep with Audit.
          tool: nextest,cargo-deny@0.20.2
      - name: Test (locked)
        run: |
          cargo nextest run --locked
          cargo test --doc --locked
      - name: cargo-deny
        run: cargo deny check
      - name: Docs build clean
        run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps --locked
      - name: Package builds
        run: cargo package --locked

  publish:
    name: Publish to crates.io
    needs: [preflight, gates]
    runs-on: ubuntu-latest
    # Required-reviewer approval gate; crates.io trusted publishing is bound to
    # this repo + workflow + environment.
    environment: release
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: ${{ env.RELEASE_TOOLCHAIN }}
      - uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5
        id: auth
      - run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  # Three-way check: a fresh local package of the tag == the CDN artifact ==
  # the sparse-index checksum cargo verifies on every download. The hash is
  # recorded in the GitHub Release as an independent public record.
  verify:
    name: Verify published artifact
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write # creates the GitHub Release
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: ${{ env.RELEASE_TOOLCHAIN }}
      - name: Repackage the tagged tree
        run: cargo package --locked --no-verify
      - name: Fetch the registry artifact (retry while the CDN catches up)
        run: |
          version="${GITHUB_REF_NAME#v}"
          for _ in $(seq 1 30); do
            curl -fsSL -o registry.crate \
              "https://static.crates.io/crates/sha3-selkie/sha3-selkie-${version}.crate" && exit 0
            sleep 10
          done
          exit 1
      - name: Registry artifact and index checksum match our build
        run: |
          version="${GITHUB_REF_NAME#v}"
          sha=$(sha256sum "target/package/sha3-selkie-${version}.crate" | cut -d' ' -f1)
          echo "$sha  registry.crate" | sha256sum -c -
          cksum=$(curl -fsSL https://index.crates.io/sh/a3/sha3-selkie \
            | jq -r --arg v "$version" 'select(.vers == $v).cksum')
          [ "$sha" = "$cksum" ]
          echo "CRATE_SHA256=$sha" >> "$GITHUB_ENV"
      - name: Create GitHub Release recording hash and toolchain
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" --verify-tag \
            --title "sha3-selkie ${GITHUB_REF_NAME}" \
            --notes "\`.crate\` SHA-256: \`${CRATE_SHA256}\` (built and verified with Rust ${RELEASE_TOOLCHAIN})."
