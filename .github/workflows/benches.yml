name: Benchmarks

# Runs the divan benchmarks on a fixed runner and publishes the results as a
# build artifact plus a job-summary table. This is the data source a
# perf-trend dashboard consumes; standing up that dashboard (a fly.io site +
# an upload token) is a separate follow-up — nothing here needs new infra.
#
# Hosted-runner CPUs are shared, so absolute numbers are noisy; the artifact
# is for relative trends across commits on the same runner class, not
# publishable cycle counts.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: never

jobs:
  bench:
    name: divan (${{ matrix.backend }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      # One leg per vector backend: two-way NEON on aarch64 macOS, four-way AVX2
      # on x86. `flags` forces each backend's feature explicitly — sha3 is an
      # Apple default, avx2 is not — so the active backend is visible here.
      matrix:
        include:
          - { backend: neon, os: macos-latest, flags: "-C target-feature=+sha3" }
          - { backend: avx2, os: ubuntu-latest, flags: "-C target-feature=+avx2" }
    env:
      RUSTFLAGS: ${{ matrix.flags }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Run benchmarks
        run: cargo bench --bench hash_functions | tee bench-results.txt
      - name: Publish to job summary
        run: |
          {
            echo '## divan benchmarks (`${{ matrix.backend }}`, `${{ runner.arch }}`, commit `${{ github.sha }}`)'
            echo '```'
            cat bench-results.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bench-results-${{ matrix.backend }}
          path: bench-results.txt
          retention-days: 90
