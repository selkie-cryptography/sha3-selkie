name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: nightly
          components: rustfmt
      - run: cargo +nightly fmt --all --check

  clippy:
    name: clippy (${{ matrix.backend }})
    runs-on: ${{ matrix.os }}
    env:
      RUSTFLAGS: ${{ matrix.flags }}
    strategy:
      fail-fast: false
      # One leg per Keccak backend: portable (scalar) on x86, four-way AVX2 on
      # x86, two-way NEON on aarch64 macOS. `flags` forces each backend's feature
      # explicitly — sha3 is an Apple default, avx2 is not — so the active
      # backend is visible rather than relying on a target default.
      matrix:
        include:
          - { backend: portable, os: ubuntu-latest, flags: "" }
          - { backend: avx2, os: ubuntu-latest, flags: "-C target-feature=+avx2" }
          - { backend: neon, os: macos-latest, flags: "-C target-feature=+sha3" }
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo clippy --all-targets -- -D warnings

  doc:
    name: doc (${{ matrix.backend }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { backend: portable, os: ubuntu-latest, flags: "" }
          - { backend: avx2, os: ubuntu-latest, flags: "-C target-feature=+avx2" }
          - { backend: neon, os: macos-latest, flags: "-C target-feature=+sha3" }
    env:
      RUSTDOCFLAGS: -D warnings
      RUSTFLAGS: ${{ matrix.flags }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo doc --no-deps --document-private-items

  test:
    name: test (${{ matrix.backend }})
    runs-on: ${{ matrix.os }}
    env:
      RUSTFLAGS: ${{ matrix.flags }}
    strategy:
      fail-fast: false
      # The AVX2 and NEON legs run the batched permutation against the same
      # known-answer and differential vectors on the arch where it is selected,
      # so `permute_x4` is validated on real x86 and aarch64 hardware.
      matrix:
        include:
          - { backend: portable, os: ubuntu-latest, flags: "" }
          - { backend: avx2, os: ubuntu-latest, flags: "-C target-feature=+avx2" }
          - { backend: neon, os: macos-latest, flags: "-C target-feature=+sha3" }
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable
      - uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2
        with:
          tool: nextest
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Unit tests
        run: cargo nextest run
      # nextest does not run doctests; the README example is one, so run it.
      - name: Doctests
        run: cargo test --doc

  benches-compile:
    name: Benchmarks compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo bench --no-run

  msrv:
    name: MSRV (1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: "1.85"
      - run: cargo build

  no-std:
    name: no_std build
    # Builds the library for a bare-metal target with no `std`, proving the
    # `#![no_std]` claim (dev-dependencies are std but are not compiled here).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable
          targets: thumbv7em-none-eabi
      - run: cargo build --target thumbv7em-none-eabi
