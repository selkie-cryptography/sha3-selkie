name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: nightly
          components: rustfmt
      - run: cargo +nightly fmt --all --check

  clippy:
    name: clippy (${{ matrix.backend }})
    runs-on: ${{ matrix.os }}
    env:
      RUSTFLAGS: ${{ matrix.flags }}
    strategy:
      fail-fast: false
      # One leg per Keccak backend: portable (scalar) on x86, four-way AVX2 on
      # x86, two-way NEON on aarch64 macOS, hybrid scalar/NEON on arm64 Linux
      # (non-Apple vendor selects it). `flags` forces each backend's feature
      # explicitly — sha3 is an Apple default, avx2 is not — so the active
      # backend is visible rather than relying on a target default.
      matrix:
        include:
          - { backend: portable, os: ubuntu-latest, flags: "" }
          - { backend: avx2, os: ubuntu-latest, flags: "-C target-feature=+avx2" }
          - { backend: neon, os: macos-latest, flags: "-C target-feature=+sha3" }
          - { backend: hybrid, os: ubuntu-24.04-arm, flags: "-C target-feature=+sha3" }
          - { backend: avx512, os: ubuntu-latest, flags: "-C target-feature=+avx2,+avx512f,+avx512vl" }
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # RUSTFLAGS without an explicit target also applies to build scripts
      # and proc macros, which run on the host CPU; pinning the build target
      # scopes the AVX-512 flags to target artifacts only.
      - name: Pin the build target
        if: matrix.backend == 'avx512'
        run: echo "CARGO_BUILD_TARGET=x86_64-unknown-linux-gnu" >> "$GITHUB_ENV"
      - run: cargo clippy --all-targets -- -D warnings

  doc:
    name: doc (${{ matrix.backend }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { backend: portable, os: ubuntu-latest, flags: "" }
          - { backend: avx2, os: ubuntu-latest, flags: "-C target-feature=+avx2" }
          - { backend: neon, os: macos-latest, flags: "-C target-feature=+sha3" }
          - { backend: hybrid, os: ubuntu-24.04-arm, flags: "-C target-feature=+sha3" }
          - { backend: avx512, os: ubuntu-latest, flags: "-C target-feature=+avx2,+avx512f,+avx512vl" }
    env:
      RUSTDOCFLAGS: -D warnings
      RUSTFLAGS: ${{ matrix.flags }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # RUSTFLAGS without an explicit target also applies to build scripts
      # and proc macros, which run on the host CPU; pinning the build target
      # scopes the AVX-512 flags to target artifacts only.
      - name: Pin the build target
        if: matrix.backend == 'avx512'
        run: echo "CARGO_BUILD_TARGET=x86_64-unknown-linux-gnu" >> "$GITHUB_ENV"
      - run: cargo doc --no-deps --document-private-items

  test:
    name: test (${{ matrix.backend }})
    runs-on: ${{ matrix.os }}
    env:
      RUSTFLAGS: ${{ matrix.flags }}
    strategy:
      fail-fast: false
      # The AVX2, NEON, and hybrid legs run the batched permutation against the
      # same known-answer and differential vectors on the arch where each is
      # selected, so `permute_x4` is validated on real x86 and aarch64 hardware
      # (the hybrid leg on a Neoverse-class core, its actual deployment target).
      matrix:
        include:
          - { backend: portable, os: ubuntu-latest, flags: "" }
          - { backend: avx2, os: ubuntu-latest, flags: "-C target-feature=+avx2" }
          - { backend: neon, os: macos-latest, flags: "-C target-feature=+sha3" }
          - { backend: hybrid, os: ubuntu-24.04-arm, flags: "-C target-feature=+sha3" }
          - { backend: avx512, os: ubuntu-latest, flags: "-C target-feature=+avx2,+avx512f,+avx512vl" }
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable
      - uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2
        with:
          tool: nextest
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # RUSTFLAGS without an explicit target also applies to build scripts
      # and proc macros, which run on the host CPU; pinning the build target
      # scopes the AVX-512 flags to target artifacts only.
      - name: Pin the build target
        if: matrix.backend == 'avx512'
        run: echo "CARGO_BUILD_TARGET=x86_64-unknown-linux-gnu" >> "$GITHUB_ENV"
      # The avx512 leg runs its test binaries under Intel SDE, so the backend
      # is validated regardless of whether the runner's CPU has AVX-512.
      - name: Set up Intel SDE
        if: matrix.backend == 'avx512'
        uses: petarpetrovt/setup-sde@31aa4a8e85e109bef00f1d838613fcc6ec421271 # v5.0
      - name: Route test binaries through SDE
        if: matrix.backend == 'avx512'
        run: |
          sudo sysctl -qw kernel.yama.ptrace_scope=0
          echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUNNER=$SDE_PATH/sde64 -icl --" >> "$GITHUB_ENV"
      - name: Unit tests
        run: cargo nextest run
      # nextest does not run doctests; the README example is one, so run it.
      - name: Doctests
        run: cargo test --doc

  benches-compile:
    name: Benchmarks compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo bench --no-run

  msrv:
    name: MSRV (1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: "1.85"
      - run: cargo build

  no-std:
    name: no_std build
    # Builds the library for bare-metal targets with no `std`, proving the
    # `#![no_std]` claim (dev-dependencies are std but are not compiled here).
    # The aarch64 leg forces sha3 so the hybrid backend's global_asm! kernel
    # is proven no_std too (vendor "unknown" selects it), in release because
    # module-level asm assembles differently there (see the .arch note in
    # src/backend/keccak_x4_hybrid.s).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable
          targets: thumbv7em-none-eabi, aarch64-unknown-none
      - run: cargo build --target thumbv7em-none-eabi
      - run: cargo build --release --target aarch64-unknown-none
        env:
          RUSTFLAGS: "-C target-feature=+neon,+sha3"
