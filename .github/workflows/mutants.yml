name: Mutants

on:
  pull_request:
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Per-arch legs run with that arch's backend feature forced on (sha3 is an
# Apple default, avx2 is not — forcing keeps the active backend visible), so
# backend mutants are exercised where their code compiles. Each leg excludes
# the other legs' backend files: cargo-mutants walks source with syn
# (cfg-blind), so it would emit mutants for a cfg'd-out file, and those
# survive trivially. The hybrid backend compiles only on non-Apple aarch64,
# so its mutants run on the arm64 Linux leg.
jobs:
  incremental:
    name: cargo-mutants (changed code, ${{ matrix.arch }})
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            os: ubuntu-latest
            flags: "-C target-feature=+avx2"
            exclude: "src/backend/neon.rs src/backend/hybrid.rs"
          - arch: aarch64-apple
            os: macos-latest
            flags: "-C target-feature=+sha3"
            exclude: "src/backend/avx2.rs src/backend/hybrid.rs"
          - arch: aarch64-hybrid
            os: ubuntu-24.04-arm
            flags: "-C target-feature=+sha3"
            exclude: "src/backend/avx2.rs"
    runs-on: ${{ matrix.os }}
    env:
      RUSTFLAGS: ${{ matrix.flags }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: nightly
      - uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2
        with:
          tool: cargo-mutants,cargo-nextest
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Mutate the PR diff
        run: |
          git diff "origin/${{ github.base_ref }}" -- . > pr.diff
          args=()
          for f in ${{ matrix.exclude }}; do args+=(--exclude "$f"); done
          status=0
          cargo mutants --in-diff pr.diff --test-tool nextest "${args[@]}" || status=$?
          # Exit 3 means a mutant hung the tests: an infinite-loop mutant is
          # killed by the timeout, not missed. But timeout outranks missed in
          # cargo-mutants' exit code, so accept it only when nothing was also
          # missed.
          if [ "$status" -eq 3 ] && [ ! -s mutants.out/missed.txt ]; then status=0; fi
          exit "$status"

  # Weekly full-tree run on both arches, so every backend's mutations are
  # exercised on the arch where its code actually compiles.
  full:
    name: cargo-mutants (full, ${{ matrix.arch }})
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            os: ubuntu-latest
            flags: "-C target-feature=+avx2"
            exclude: "src/backend/neon.rs src/backend/hybrid.rs"
          - arch: aarch64-apple
            os: macos-latest
            flags: "-C target-feature=+sha3"
            exclude: "src/backend/avx2.rs src/backend/hybrid.rs"
          - arch: aarch64-hybrid
            os: ubuntu-24.04-arm
            flags: "-C target-feature=+sha3"
            exclude: "src/backend/avx2.rs"
    runs-on: ${{ matrix.os }}
    env:
      RUSTFLAGS: ${{ matrix.flags }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: nightly
      - uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2
        with:
          tool: cargo-mutants,cargo-nextest
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: |
          args=()
          for f in ${{ matrix.exclude }}; do args+=(--exclude "$f"); done
          status=0
          cargo mutants --test-tool nextest "${args[@]}" || status=$?
          # As in the incremental job: timeouts are kills, but only accepted
          # when nothing was also missed.
          if [ "$status" -eq 3 ] && [ ! -s mutants.out/missed.txt ]; then status=0; fi
          exit "$status"
