name: Mutants

on:
  pull_request:
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Per-arch legs run with that arch's backend feature forced on (sha3 is an
# Apple default, avx2 is not — forcing keeps the active backend visible), so
# backend mutants are exercised where their code compiles. Each leg excludes
# the other arch's backend file: cargo-mutants walks source with syn
# (cfg-blind), so it would emit mutants for the cfg'd-out file, and those
# survive trivially.
jobs:
  incremental:
    name: cargo-mutants (changed code, ${{ matrix.arch }})
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            os: ubuntu-latest
            flags: "-C target-feature=+avx2"
            exclude: src/backend/neon.rs
          - arch: aarch64
            os: macos-latest
            flags: "-C target-feature=+sha3"
            exclude: src/backend/avx2.rs
    runs-on: ${{ matrix.os }}
    env:
      RUSTFLAGS: ${{ matrix.flags }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: nightly
      - uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2
        with:
          tool: cargo-mutants,cargo-nextest
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Mutate the PR diff
        run: |
          git diff "origin/${{ github.base_ref }}" -- . > pr.diff
          cargo mutants --in-diff pr.diff --test-tool nextest --exclude "${{ matrix.exclude }}"

  # Weekly full-tree run on both arches, so every backend's mutations are
  # exercised on the arch where its code actually compiles.
  full:
    name: cargo-mutants (full, ${{ matrix.arch }})
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            os: ubuntu-latest
            flags: "-C target-feature=+avx2"
            exclude: src/backend/neon.rs
          - arch: aarch64
            os: macos-latest
            flags: "-C target-feature=+sha3"
            exclude: src/backend/avx2.rs
    runs-on: ${{ matrix.os }}
    env:
      RUSTFLAGS: ${{ matrix.flags }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: nightly
      - uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2
        with:
          tool: cargo-mutants,cargo-nextest
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo mutants --test-tool nextest --exclude "${{ matrix.exclude }}"
